name: iOS Build

on:
  push:
    paths:
      - 'apps/ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: apps/ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Device-only build: iphoneos + generic iOS (NOT iOS Simulator).
      - name: Build for device (iphoneos, no code signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Ghostyc.xcodeproj \
            -scheme Ghostyc \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Archive for device (iphoneos, unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Ghostyc.xcodeproj \
            -scheme Ghostyc \
            -sdk iphoneos \
            -archivePath build/Ghostyc.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Export .app into IPA Payload
        run: |
          set -euo pipefail
          mkdir -p build/Payload
          cp -R build/Ghostyc.xcarchive/Products/Applications/Ghostyc.app build/Payload/
          (cd build && zip -r Ghostyc.ipa Payload/)

      - name: Verify IPA Info.plist and bundle layout
        working-directory: apps/ios/build
        run: |
          set -euo pipefail
          test -f Ghostyc.ipa
          rm -rf ipa_verify
          mkdir ipa_verify
          unzip -q Ghostyc.ipa -d ipa_verify
          APP="ipa_verify/Payload/Ghostyc.app"
          PLIST="$APP/Info.plist"
          BIN="$APP/Ghostyc"
          test -d "$APP"
          test -f "$PLIST"
          test -f "$BIN" || { echo "::error::Missing executable at Payload/Ghostyc.app/Ghostyc"; exit 1; }

          echo "== Info.plist bundle keys (from packaged IPA) =="
          EXEC=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$PLIST" 2>/dev/null) || true
          NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleName' "$PLIST" 2>/dev/null) || true
          DISP=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$PLIST" 2>/dev/null) || true
          echo "CFBundleExecutable=${EXEC:-<missing>}"
          echo "CFBundleName=${NAME:-<missing>}"
          echo "CFBundleDisplayName=${DISP:-<missing>}"

          if [ -z "${EXEC:-}" ]; then
            echo "::error::CFBundleExecutable is missing from Payload/Ghostyc.app/Info.plist"
            exit 1
          fi
          if [ "$EXEC" != "Ghostyc" ]; then
            echo "::error::CFBundleExecutable must be exactly Ghostyc (got: $EXEC)"
            exit 1
          fi
          if [ "${NAME:-}" != "Ghostyc" ]; then
            echo "::error::CFBundleName must be Ghostyc (got: ${NAME:-})"
            exit 1
          fi
          if [ "${DISP:-}" != "Ghostyc" ]; then
            echo "::error::CFBundleDisplayName must be Ghostyc (got: ${DISP:-})"
            exit 1
          fi

      - name: Verify binary is iphoneos / arm64 (not Simulator)
        working-directory: apps/ios/build
        run: |
          set -euo pipefail
          BIN="Payload/Ghostyc.app/Ghostyc"
          test -f "$BIN"

          echo "== Architectures (lipo) =="
          lipo -info "$BIN"
          LIPO_OUT=$(lipo -info "$BIN")
          echo "$LIPO_OUT" | grep -q arm64 || { echo "::error::lipo must list arm64"; exit 1; }
          if echo "$LIPO_OUT" | grep -Eiq 'x86_64|i386'; then
            echo "::error::lipo must not list x86_64 / i386"
            exit 1
          fi

          echo "== file $BIN =="
          file "$BIN"
          FILEOUT=$(file "$BIN")
          echo "$FILEOUT" | grep -q arm64 || { echo "::error::file output must include arm64"; exit 1; }
          if echo "$FILEOUT" | grep -Eiq 'x86_64|i386'; then
            echo "::error::file output must not reference x86_64 / i386"
            exit 1
          fi
          if echo "$FILEOUT" | grep -Eiq 'Simulator|iPhoneSimulator'; then
            echo "::error::file output must not reference Simulator / iPhoneSimulator"
            exit 1
          fi
          # Some file(1) versions only print "Mach-O 64-bit executable arm64" without "iPhoneOS".
          # Require iPhoneOS/for iOS in file when present; otherwise confirm device with vtool.
          if ! echo "$FILEOUT" | grep -Eiq 'iPhoneOS|for iOS'; then
            echo "::notice::file did not spell iPhoneOS/for iOS; checking vtool -show-build (must be PLATFORM iOS, not Simulator)"
            xcrun vtool -show-build "$BIN"
            xcrun vtool -show-build "$BIN" | grep -qiE 'platform[[:space:]]+iOS' || { echo "::error::vtool must report platform iOS (device)"; exit 1; }
            if xcrun vtool -show-build "$BIN" | grep -qi 'simulator'; then
              echo "::error::vtool must not report Simulator platform"
              exit 1
            fi
          fi

          echo "== LC_BUILD_VERSION (platform 2 = iOS device, 7 = iOS Simulator) =="
          PLATFORM=$(xcrun otool -l "$BIN" | grep -A3 LC_BUILD_VERSION | grep -E '[[:space:]]platform[[:space:]]' | head -1 | awk '{print $2}')
          echo "platform = ${PLATFORM:-unknown}"
          if [ "${PLATFORM:-}" = "7" ]; then
            echo "::error::Binary targets iOS Simulator (platform 7), expected iOS device (platform 2)"
            exit 1
          fi
          if [ "${PLATFORM:-}" != "2" ]; then
            echo "::error::Expected LC_BUILD_VERSION platform 2 (iOS / iPhoneOS), got: ${PLATFORM:-empty}"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghostyc-unsigned-ipa
          path: apps/ios/build/Ghostyc.ipa
          if-no-files-found: warn
